<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../assets/css/login.css">

<body>
    <header>
        

    </header>
    <main>
        <section class="css-login-form-section css-liquid-glass">
            <form action="" class="css-login-form">
                <fieldset>
                    <legend>login</legend>
                    <label for="user-name">name</label>
                    <input type="text" name="user-name" id="" title="user-name" placeholder="user name">
                    <label for="user-email">email</label>
                    <input type="email" name="user-name" id="" title="user-email" placeholder="johndoe@example.com">
                    <label for="user-password">password</label>
                    <input type="password" name="user-password" id="" title="user-password">
                    <label for="user-name">password</label>
                    <input type="text" name="user-name" id="" title="user-password">
                    <button type="submit">login</button>
                    <div class="css-change-auth-methodes">
                        <p>click here to login</p>
                    </div>
                     <div class="css-error-mesage">
                        <p>login failed</p>
                    </div>
                    
                </fieldset>
            </form>
        </section>
          <section class="css-signup-form-section">
            <form action="" class="css-login-form">
                <fieldset>
                    <legend>sign up</legend>
                    <label for="user-name">name</label>
                    <input type="text" name="user-name" id="" title="user-name" placeholder="user name">
                    <label for="user-email">email</label>
                    <input type="email" name="user-name" id="" title="user-email" placeholder="johndoe@example.com">
                    <label for="user-password">password</label>
                    <input type="password" name="user-password" id="" title="user-password">
                    <label for="user-name">password</label>
                    <input type="text" name="user-name" id="" title="user-password">
                    <button type="submit">sign up</button>
                    <div class="css-change-auth-methodes">
                        <p>click here to login</p>
                    </div>
                     <div class="css-error-mesage">
                        <p>login failed</p>
                    </div>
                </fieldset>
            </form>
        </section>

    </main>
    <footer>

    </footer>
